# 部署静态工作台到 GitHub Pages(排盘/下钻/知识库全端侧可用;
# AI 解读需另行部署网关并在构建时注入 VITE_GATEWAY_URL 指向它)。
# 首次使用需在仓库 Settings → Pages 将 Source 设为 "GitHub Actions"。
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run -w @ziwei/web build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_GATEWAY_URL: ${{ vars.ZIWEI_GATEWAY_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist
      - id: deployment
        uses: actions/deploy-pages@v4
